<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compositor — Emagrecimento Blindado</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0d; color: #f5e8d0; font-family: Arial, sans-serif; }

/* ── TOPBAR ────────────────────────────────── */
.topbar {
  background: #111; border-bottom: 2px solid #d4a64a;
  padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.topbar h1 { font-size: 14px; color: #e0b95b; letter-spacing: .1em; flex: 1; }
.btn { background: #d4a64a; color: #111; border: none; padding: 8px 18px; font-size: 12px; font-weight: bold; cursor: pointer; }
.btn:hover { background: #e0b95b; }
.btn.out { background: transparent; color: #d4a64a; border: 1px solid #d4a64a; }
.btn.out:hover { background: #d4a64a18; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── LAYOUT ─────────────────────────────────── */
.layout { display: flex; min-height: calc(100vh - 50px); }

/* ── LEFT PANEL ──────────────────────────────── */
.panel {
  width: 300px; min-width: 300px;
  background: #161616; border-right: 1px solid #252525;
  padding: 20px 16px; display: flex; flex-direction: column; gap: 18px;
  overflow-y: auto; height: calc(100vh - 50px); position: sticky; top: 0;
}
.panel-section-title { font-size: 10px; color: #8c6c28; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }

/* Upload zone */
.upload-zone {
  border: 2px dashed #c6922e; border-radius: 4px;
  background: #1a1208; padding: 24px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  cursor: pointer; text-align: center; transition: border-color .2s, background .2s;
}
.upload-zone:hover, .upload-zone.over { border-color: #e0b95b; background: #221a08; }
.upload-zone .uz-icon { font-size: 36px; }
.upload-zone .uz-title { font-size: 13px; color: #e0b95b; font-weight: bold; }
.upload-zone .uz-hint  { font-size: 11px; color: #8c6c28; }
.choose-btn {
  width: 100%; background: #d4a64a; color: #111; border: none;
  padding: 10px; font-size: 13px; font-weight: bold; cursor: pointer;
}
.choose-btn:hover { background: #e0b95b; }

/* Photo preview in panel */
.photo-preview { display: none; flex-direction: column; gap: 6px; }
.photo-preview.on { display: flex; }
.photo-preview img { width: 100%; max-height: 160px; object-fit: contain; background: #0a0a0a; border: 1px solid #2a2a2a; }
.photo-preview .fname { font-size: 10px; color: #8c6c28; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Apply buttons */
.apply-btn {
  width: 100%; background: #1c1408; color: #d4a64a;
  border: 1px solid #c6922e; padding: 9px 12px;
  font-size: 12px; font-weight: bold; cursor: pointer; text-align: left;
}
.apply-btn:hover { background: #261c0a; border-color: #e0b95b; }
.apply-btn small { display: block; font-size: 10px; color: #8c6c28; font-weight: normal; margin-top: 2px; }

/* Sliders */
.slider-row { display: flex; align-items: center; gap: 8px; }
.slider-label { font-size: 10px; color: #8c6c28; text-transform: uppercase; width: 60px; flex-shrink: 0; }
.slider-row input[type=range] { flex: 1; accent-color: #d4a64a; cursor: pointer; }
.slider-val { font-size: 10px; color: #c6922e; width: 34px; text-align: right; flex-shrink: 0; }
.slider-reset { font-size: 10px; color: #444; background: none; border: 1px solid #2a2a2a; cursor: pointer; padding: 1px 5px; }
.slider-reset:hover { color: #d4a64a; border-color: #d4a64a; }

/* Card mini-buttons */
.card-mini-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; }
.card-mini-btn {
  background: #1a1a1a; border: 1px solid #2a2a2a; color: #6a5228;
  font-size: 10px; padding: 6px 2px; cursor: pointer; text-align: center;
}
.card-mini-btn:hover { border-color: #d4a64a; color: #d4a64a; }
.card-mini-btn.sel   { background: #2a1c08; border-color: #e0b95b; color: #e0b95b; }
.card-mini-btn.hfoto { border-color: #c6922e; color: #c6922e; }

hr.div { border: none; border-top: 1px solid #222; }

/* ── MAIN GRID ────────────────────────────────── */
.main { flex: 1; padding: 20px; overflow-y: auto; }
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 20px;
}
.card-wrap { display: flex; flex-direction: column; gap: 6px; }
.card-label { font-size: 10px; color: #8c6c28; letter-spacing: .08em; text-transform: uppercase; display: flex; justify-content: space-between; }
.card-label .has-foto { color: #c6922e; display: none; }
.card-label .has-foto.on { display: block; }

/* ── CARD VIEWPORT ──────────────────────────────
   Real card: 1080 × 1350. Scale = 230/1080 ≈ 0.213
   Displayed: 230 × 287.5 ≈ 288
*/
.card-viewport {
  width: 230px; height: 288px;
  overflow: hidden; position: relative;
  border: 1px solid #222; cursor: pointer;
  flex-shrink: 0;
}
.card-viewport:hover { border-color: #d4a64a; }
.card-viewport.sel   { border: 2px solid #e0b95b; }

/* The actual card at real size, scaled down */
.card-real {
  width: 1080px; height: 1350px;
  position: absolute; top: 0; left: 0;
  transform: scale(0.2130);
  transform-origin: top left;
  font-family: Georgia, serif;
  overflow: hidden;
  background: #111;
}

/* Photo zone — 810px of 1350 */
.pzone {
  width: 1080px; height: 810px;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
/* Fundo blur — cópia da foto escalada e desfocada, preenche espaço vazio */
.pzone .foto-bg {
  position: absolute; inset: -40px;
  width: calc(100% + 80px); height: calc(100% + 80px);
  object-fit: cover;
  filter: blur(28px) brightness(0.35) saturate(0.6);
  transform: scale(1.08);
  z-index: 0;
  display: block;
}
/* Foto principal — sempre contain, nunca cortada */
.pzone .foto {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  object-position: center center;
  display: block;
  transform-origin: center center;
  z-index: 1;
}
/* Gradient overlays */
.pzone .vgrad { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
.card-real.manha    .pzone { background: linear-gradient(to bottom, rgb(8,6,2), rgb(22,14,4), rgb(52,32,8)); }
.card-real.conteudo .pzone { background: linear-gradient(to bottom, rgb(6,4,12), rgb(18,10,32), rgb(42,22,68)); }
.card-real.cta      .pzone { background: linear-gradient(to bottom, rgb(8,2,4), rgb(24,6,12), rgb(60,14,28)); }
.card-real.manha    .vgrad { background: linear-gradient(to bottom, rgba(8,6,2,.28) 0%, rgba(22,14,4,.05) 45%, rgba(52,32,8,.72) 100%), radial-gradient(ellipse at left, rgba(0,0,0,.48) 0%, transparent 55%); }
.card-real.conteudo .vgrad { background: linear-gradient(to bottom, rgba(6,4,12,.28) 0%, rgba(18,10,32,.05) 45%, rgba(42,22,68,.72) 100%), radial-gradient(ellipse at left, rgba(0,0,0,.48) 0%, transparent 55%); }
.card-real.cta      .vgrad { background: linear-gradient(to bottom, rgba(8,2,4,.28) 0%, rgba(24,6,12,.05) 45%, rgba(60,14,28,.72) 100%), radial-gradient(ellipse at left, rgba(0,0,0,.48) 0%, transparent 55%); }

/* Watermark & index */
.pwm  { position: absolute; bottom: 52px; left: 42px; z-index: 2; font-family: Arial, sans-serif; font-size: 21px; color: #8c6c28; }
.pidx { position: absolute; top: 28px; right: 42px;   z-index: 2; font-family: Arial, sans-serif; font-size: 21px; color: #8c6c28; }

/* L-corners */
.corner { position: absolute; pointer-events: none; z-index: 2; }
.ctl { top: 40px; left: 40px; width: 100px; height: 100px; border-top: 3px solid #e0b95b; border-left: 3px solid #e0b95b; }
.ctl::after { content:''; position: absolute; top: 7px; left: 7px; width: 83px; height: 83px; border-top: 2px solid #c6922e; border-left: 2px solid #c6922e; }
.cbr { bottom: 580px; right: 40px; width: 100px; height: 100px; border-bottom: 3px solid #e0b95b; border-right: 3px solid #e0b95b; }
.cbr::after { content:''; position: absolute; bottom: 7px; right: 7px; width: 83px; height: 83px; border-bottom: 2px solid #c6922e; border-right: 2px solid #c6922e; }

/* Separator */
.psep { position: absolute; top: 807px; left: 0; width: 1080px; z-index: 3; }
.psep .s1 { height: 3px; background: #c6922e; }
.psep .s2 { height: 4px; background: #e0b95b; margin-top: 1px; }

/* Text zone */
.tzone {
  position: absolute; top: 815px; left: 0; width: 1080px; height: 535px;
  padding: 50px 80px 40px; display: flex; flex-direction: column;
}
.card-real.manha    .tzone { background: linear-gradient(to bottom, #111111, #1c140c); }
.card-real.conteudo .tzone { background: linear-gradient(to bottom, #111111, #16121e); }
.card-real.cta      .tzone { background: linear-gradient(to bottom, #111111, #180a10); }
.acent { display: block; width: 100px; height: 5px; background: #e0b95b; margin-bottom: 22px; flex-shrink: 0; }
.ttl  { font-size: 100px; font-weight: bold; color: #fffcf6; line-height: 1.1; text-shadow: 2px 2px 0 #281c08; flex-shrink: 0; }
.ttl.md { font-size: 88px; }
.ttl.sm { font-size: 76px; }
.sepln { display: block; width: 60px; height: 2px; background: #c6922e; margin: 16px 0; flex-shrink: 0; }
.sub  { font-family: Arial, sans-serif; font-size: 41px; color: #f5e8d0; line-height: 1.35; flex-shrink: 0; }
.pill { display: inline-block; background: #e0b95b; color: #111; font-family: 'Arial Black', sans-serif; font-size: 46px; font-weight: bold; padding: 12px 28px; border-radius: 3px; margin-bottom: 14px; align-self: flex-start; flex-shrink: 0; }
.brand { position: absolute; bottom: 44px; right: 80px; font-family: Arial, sans-serif; font-size: 21px; color: #d4a64a; }

/* DL row */
.dl-row { display: flex; gap: 4px; }
.dl-row .btn { flex: 1; font-size: 11px; padding: 6px 8px; }

/* Status */
#status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1c1c1c; border: 1px solid #d4a64a; color: #e0b95b; padding: 10px 20px; font-size: 12px; display: none; z-index: 999; pointer-events: none; }
#status.on { display: block; }
#prog { position: fixed; bottom: 0; left: 0; height: 3px; background: #d4a64a; width: 0; transition: width .2s; z-index: 999; }
</style>
</head>
<body>

<div class="topbar">
  <h1>EMAGRECIMENTO BLINDADO · Compositor de Fotos</h1>
  <button class="btn out" id="btn-dl-all">⬇ Baixar todos os 10 cards</button>
</div>

<div class="layout">

  <!-- ══ PAINEL ESQUERDO ══════════════════════════ -->
  <div class="panel">

    <div>
      <div class="panel-section-title">📷 Foto da Especialista</div>
    </div>

    <!-- Zona de Upload -->
    <div id="upload-zone" class="upload-zone">
      <div class="uz-icon">📷</div>
      <div class="uz-title">Arraste a foto aqui</div>
      <div class="uz-hint">ou clique no botão abaixo</div>
    </div>
    <button class="choose-btn" onclick="fileInput.click()">Escolher Foto</button>

    <!-- Preview da foto -->
    <div class="photo-preview" id="photo-preview">
      <img id="preview-img" src="" alt="preview">
      <div class="fname" id="preview-name"></div>
      <button class="choose-btn" style="padding:7px;font-size:11px;" onclick="fileInput.click()">↺ Trocar foto</button>
    </div>

    <hr class="div">

    <!-- Aplicar para -->
    <div>
      <div class="panel-section-title" style="margin-bottom:8px">Aplicar foto em</div>
      <button class="apply-btn" id="btn-apply-all">
        ✦ Todos os 10 cards
        <small>Mesma foto em todo o carrossel</small>
      </button>
      <div style="height:6px"></div>
      <button class="apply-btn" id="btn-apply-sel">
        ▶ Card selecionado
        <small id="sel-hint">Clique em um card na grade →</small>
      </button>
    </div>

    <hr class="div">

    <!-- Controles de ajuste -->
    <div>
      <div class="panel-section-title" style="margin-bottom:8px">Ajuste fino</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="slider-row">
          <span class="slider-label">Zoom</span>
          <input type="range" id="s-zoom" min="50" max="300" step="1" value="100">
          <span class="slider-val" id="v-zoom">100%</span>
          <button class="slider-reset" onclick="resetSlider('zoom',100)">↺</button>
        </div>
        <div class="slider-row">
          <span class="slider-label">Vertical</span>
          <input type="range" id="s-posY" min="0" max="100" step="1" value="50">
          <span class="slider-val" id="v-posY">50%</span>
          <button class="slider-reset" onclick="resetSlider('posY',50)">↺</button>
        </div>
        <div class="slider-row">
          <span class="slider-label">Horizontal</span>
          <input type="range" id="s-posX" min="0" max="100" step="1" value="50">
          <span class="slider-val" id="v-posX">50%</span>
          <button class="slider-reset" onclick="resetSlider('posX',50)">↺</button>
        </div>
      </div>
    </div>

    <hr class="div">

    <!-- Mini seleção de cards -->
    <div>
      <div class="panel-section-title" style="margin-bottom:8px">Selecionar card</div>
      <div class="card-mini-grid" id="mini-grid"></div>
    </div>

  </div>

  <!-- ══ GRADE DE CARDS ═══════════════════════════ -->
  <div class="main">
    <div class="cards-grid" id="cards-grid"></div>
  </div>

</div>

<div id="render-zone" style="position:fixed;left:-9999px;top:0;pointer-events:none;overflow:hidden;width:1080px;height:1350px;"></div>
<div id="status"></div>
<div id="prog"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none">

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const TIPO = "conteudo";
const CARDS = [
  { t:"VOCÊ FAZ\nTUDO CERTO.", s:"E mesmo assim,\na balança não move." },
  { t:"Você acorda\ncedo.", s:"Come menos do que todo mundo.\nE seu corpo parece ignorar." },
  { t:"Segue a dieta.", s:"Corta o pão. Corta o doce.\nCorta tudo. E nada muda." },
  { t:"Faz exercício.", s:"Se esforça mais do que amigas\nque emagrecem sem fazer metade." },
  { t:"E mesmo assim.", s:"O peso não sai. As roupas continuam\napertando. A frustração cresce." },
  { t:"A culpa não\né sua.", s:"Depois dos 35, o corpo muda por dentro.\nOs hormônios mudam as regras." },
  { t:"O que funcionava\nantes...", s:"...pode ser exatamente o que\nsabota você hoje." },
  { t:"Não é força\nde vontade.", s:"É estratégia. Seu corpo precisa de\numa abordagem diferente agora." },
  { t:"Existe\numa saída.", s:"E ela começa entendendo o que realmente\nestá acontecendo dentro de você." },
  { t:"Quer entender\no método?", s:"Comente BLINDADO.", pill:true },
];
const ID = "faztudocerto";

// ── STATE ─────────────────────────────────────────────────────────────────────
const store     = {};   // store[num] = { dataURL, zoom, posX, posY }
let currentURL  = null;
let selectedNum = null;

// ── BUILD GRID ────────────────────────────────────────────────────────────────
const cardsGrid = document.getElementById('cards-grid');
const miniGrid  = document.getElementById('mini-grid');

for (let i = 0; i < CARDS.length; i++) {
  const num  = i + 1;
  const card = CARDS[i];

  // Mini button
  const mb = document.createElement('button');
  mb.className = 'card-mini-btn';
  mb.id = 'mb-' + num;
  mb.textContent = num;
  mb.onclick = () => selectCard(num);
  miniGrid.appendChild(mb);

  // Card wrap
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';

  // Label
  const lbl = document.createElement('div');
  lbl.className = 'card-label';
  lbl.innerHTML = '<span>Card ' + num + ' / 10</span><span class="has-foto" id="badge-'+num+'">● foto</span>';

  // Viewport
  const vp = document.createElement('div');
  vp.className = 'card-viewport';
  vp.id = 'vp-' + num;
  vp.onclick = () => selectCard(num);

  // Real card
  const real = makeCard(card, num, null, {zoom:100,posX:50,posY:50});
  real.id = 'real-' + num;
  vp.appendChild(real);

  // DL row
  const dlr = document.createElement('div');
  dlr.className = 'dl-row';
  const dlb = document.createElement('button');
  dlb.className = 'btn';
  dlb.textContent = '⬇ PNG';
  dlb.onclick = () => exportOne(num, dlb);
  const clb = document.createElement('button');
  clb.className = 'btn out';
  clb.textContent = '✕';
  clb.title = 'Remover foto deste card';
  clb.onclick = () => clearCard(num);
  dlr.appendChild(dlb);
  dlr.appendChild(clb);

  wrap.appendChild(lbl);
  wrap.appendChild(vp);
  wrap.appendChild(dlr);
  cardsGrid.appendChild(wrap);
}

// ── MAKE CARD DOM ─────────────────────────────────────────────────────────────
function makeCard(card, num, photoURL, t) {
  const root = document.createElement('div');
  root.className = 'card-real ' + TIPO;

  // — Photo zone —
  const pz = document.createElement('div');
  pz.className = 'pzone';

  if (photoURL) {
    // Fundo blur — preenche espaço vazio elegantemente
    const bg = document.createElement('img');
    bg.className = 'foto-bg';
    bg.src = photoURL;
    pz.appendChild(bg);
    // Foto principal — contain, nunca cortada
    const img = document.createElement('img');
    img.className = 'foto';
    img.src = photoURL;
    setImgTransform(img, t);
    pz.appendChild(img);
  }

  const vg = document.createElement('div'); vg.className = 'vgrad'; pz.appendChild(vg);
  mk(pz, 'div', 'pwm',  '@emagrecimentoblindado');
  mk(pz, 'div', 'pidx', (num < 10 ? '0'+num : num) + ' / 10');
  mk(pz, 'div', 'corner ctl');
  mk(pz, 'div', 'corner cbr');
  root.appendChild(pz);

  // — Separator —
  const sep = document.createElement('div'); sep.className = 'psep';
  sep.innerHTML = '<div class="s1"></div><div class="s2"></div>';
  root.appendChild(sep);

  // — Text zone —
  const tz = document.createElement('div'); tz.className = 'tzone';
  mk(tz, 'span', 'acent');

  const tlen = card.t.replace(/\n/g,' ').length;
  const tcls = 'ttl' + (tlen > 26 ? ' sm' : tlen > 14 ? ' md' : '');
  const ttl = document.createElement('div'); ttl.className = tcls;
  ttl.innerHTML = card.t.replace(/\n/g, '<br>');
  tz.appendChild(ttl);
  mk(tz, 'span', 'sepln');

  if (card.pill) {
    mk(tz, 'div', 'pill', 'BLINDADO');
    mk(tz, 'div', 'sub',  'e entre para o Grupo VIP gratuito.');
  } else {
    const sub = document.createElement('div'); sub.className = 'sub';
    sub.innerHTML = card.s.replace(/\n/g,'<br>');
    tz.appendChild(sub);
  }
  mk(tz, 'div', 'brand', '@emagrecimentoblindado');
  root.appendChild(tz);

  return root;
}

function mk(parent, tag, cls, text) {
  const el = document.createElement(tag);
  el.className = cls;
  if (text) el.textContent = text;
  parent.appendChild(el);
  return el;
}

function setImgTransform(img, t) {
  img.style.objectFit       = 'contain';
  img.style.objectPosition  = t.posX + '% ' + t.posY + '%';
  img.style.transform       = 'scale(' + (t.zoom / 100) + ')';
  img.style.transformOrigin = t.posX + '% ' + t.posY + '%';
}

function rebuildCard(num) {
  const old = document.getElementById('real-' + num);
  if (!old) return;
  const s   = store[num];
  const el  = makeCard(CARDS[num-1], num, s ? s.dataURL : null, s || {zoom:100,posX:50,posY:50});
  el.id     = 'real-' + num;
  old.replaceWith(el);
}

function updateTransformLive(num) {
  const img = document.querySelector('#real-' + num + ' .foto');
  if (!img || !store[num]) return;
  setImgTransform(img, store[num]);
}

// ── FILE INPUT ────────────────────────────────────────────────────────────────
const fileInput = document.getElementById('fileInput');
fileInput.onchange = () => {
  const f = fileInput.files[0];
  if (f) loadFile(f);
  fileInput.value = '';
};

const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('click',     () => fileInput.click());
uploadZone.addEventListener('dragover',  e  => { e.preventDefault(); uploadZone.classList.add('over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('over'));
uploadZone.addEventListener('drop',      e  => {
  e.preventDefault(); uploadZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    currentURL = e.target.result;
    // Show preview
    document.getElementById('preview-img').src  = currentURL;
    document.getElementById('preview-name').textContent = file.name;
    document.getElementById('photo-preview').classList.add('on');
    uploadZone.querySelector('.uz-icon').textContent  = '✓';
    uploadZone.querySelector('.uz-title').textContent = 'Foto carregada!';
    uploadZone.querySelector('.uz-hint').textContent  = 'Clique para trocar';
  };
  reader.readAsDataURL(file);
}

// ── APPLY BUTTONS ──────────────────────────────────────────────────────────────
document.getElementById('btn-apply-all').onclick = () => {
  if (!currentURL) { alert('Carregue uma foto primeiro.'); return; }
  const t = getSliders();
  for (let i = 1; i <= 10; i++) {
    store[i] = { dataURL: currentURL, ...t };
    rebuildCard(i);
    setBadge(i, true);
    setMiniHasFoto(i, true);
  }
  showStatus('✓ Foto aplicada em todos os 10 cards!', 3000);
};

document.getElementById('btn-apply-sel').onclick = () => {
  if (!currentURL)  { alert('Carregue uma foto primeiro.'); return; }
  if (!selectedNum) { alert('Clique em um card para selecioná-lo.'); return; }
  const t = getSliders();
  store[selectedNum] = { dataURL: currentURL, ...t };
  rebuildCard(selectedNum);
  setBadge(selectedNum, true);
  setMiniHasFoto(selectedNum, true);
  showStatus('✓ Foto aplicada no card ' + selectedNum + '.', 2500);
};

// ── SLIDERS ────────────────────────────────────────────────────────────────────
['zoom','posY','posX'].forEach(k => {
  document.getElementById('s-' + k).addEventListener('input', function() {
    document.getElementById('v-' + k).textContent = this.value + '%';
    if (selectedNum && store[selectedNum]) {
      store[selectedNum][k] = parseFloat(this.value);
      updateTransformLive(selectedNum);
    }
  });
});

function getSliders() {
  return {
    zoom: parseFloat(document.getElementById('s-zoom').value),
    posX: parseFloat(document.getElementById('s-posX').value),
    posY: parseFloat(document.getElementById('s-posY').value),
  };
}

function resetSlider(k, def) {
  document.getElementById('s-' + k).value = def;
  document.getElementById('v-' + k).textContent = def + '%';
  if (selectedNum && store[selectedNum]) {
    store[selectedNum][k] = def;
    updateTransformLive(selectedNum);
  }
}

// ── SELECT CARD ────────────────────────────────────────────────────────────────
function selectCard(num) {
  if (selectedNum) {
    document.getElementById('vp-' + selectedNum)?.classList.remove('sel');
    document.getElementById('mb-' + selectedNum)?.classList.remove('sel');
  }
  selectedNum = num;
  document.getElementById('vp-' + num)?.classList.add('sel');
  document.getElementById('mb-' + num)?.classList.add('sel');
  document.getElementById('sel-hint').textContent = 'Card ' + num + ' selecionado';

  // Sync sliders
  const t = store[num] || { zoom:100, posX:50, posY:50 };
  document.getElementById('s-zoom').value = t.zoom; document.getElementById('v-zoom').textContent = t.zoom + '%';
  document.getElementById('s-posX').value = t.posX; document.getElementById('v-posX').textContent = t.posX + '%';
  document.getElementById('s-posY').value = t.posY; document.getElementById('v-posY').textContent = t.posY + '%';
}

function clearCard(num) {
  delete store[num];
  rebuildCard(num);
  setBadge(num, false);
  setMiniHasFoto(num, false);
}

function setBadge(num, on)      { document.getElementById('badge-' + num)?.classList.toggle('on', on); }
function setMiniHasFoto(num, on){ document.getElementById('mb-' + num)?.classList.toggle('hfoto', on); }

// ── EXPORT ─────────────────────────────────────────────────────────────────────
const renderZone = document.getElementById('render-zone');

async function exportOne(num, btn) {
  const fname = 'carrossel_' + ID + '_card_' + (num < 10 ? '0'+num : num) + '.png';
  if (btn) { btn.textContent='⏳'; btn.disabled=true; }
  showStatus('Gerando ' + fname + '…');

  renderZone.innerHTML = '';
  const s    = store[num];
  const full = makeCard(CARDS[num-1], num, s ? s.dataURL : null, s || {zoom:100,posX:50,posY:50});
  renderZone.appendChild(full);

  if (s && s.dataURL) {
    await new Promise(r => {
      const img = full.querySelector('img');
      if (!img || img.complete) { r(); return; }
      img.onload = r; img.onerror = r;
    });
  }
  await sleep(150);

  try {
    const canvas = await html2canvas(full, {
      scale: 1, width: 1080, height: 1350,
      useCORS: true, allowTaint: true,
      backgroundColor: '#111111', logging: false,
      windowWidth: 1080, windowHeight: 1350,
    });
    canvas.toBlob(blob => {
      dlBlob(blob, fname);
      if (btn) { btn.textContent='✓'; btn.disabled=false; setTimeout(()=>{ btn.textContent='⬇ PNG'; },2500); }
      clearStatus();
    }, 'image/png');
  } catch(err) {
    console.error(err);
    showStatus('Erro: ' + err.message);
    if (btn) { btn.textContent='⚠'; btn.disabled=false; }
  }
}

document.getElementById('btn-dl-all').onclick = async () => {
  const prog = document.getElementById('prog');
  for (let i = 1; i <= 10; i++) {
    prog.style.width = ((i-1)/10*100) + '%';
    await exportOne(i, null);
    await sleep(350);
  }
  prog.style.width = '100%';
  showStatus('✓ Todos os 10 cards exportados!', 5000);
  setTimeout(() => { prog.style.width = '0'; }, 5000);
};

// ── UTILS ──────────────────────────────────────────────────────────────────────
function dlBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showStatus(msg, dur) {
  const el = document.getElementById('status');
  el.textContent = msg; el.classList.add('on');
  if (dur) setTimeout(clearStatus, dur);
}
function clearStatus() { document.getElementById('status').classList.remove('on'); }
</script>
